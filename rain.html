<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>
    <title>Document</title>
</head>

<body id="rain_page">
    <main>
        <section class="content">
            <h1>light evening rain</h1>
            <section class="main">
                <a href="index.html">storm</a>
                <a href="beach.html">beach</a>
                <button>rain</button>
            </section>
            <section class="settings">
                <button class="play">Play</button>
                <label for="volume">Volume: </label>
                <input type="range" class="volume" id="volume" name="volume" min="0" max="100" value="100"><span class="level"> </span>
                <button class="mute ">Mute</button>
                <audio loop class="sound">
                    <source src="sounds/rain.wav" type="audio/wav">
                </audio>
                <button class="hide">Hide Content</button>
                <button class="stop" id="stop_rain">stop animation</button>
            </section>
            <section class="credits">
                <a href="credits.html">view credits</a>
            </section>
        </section>
        <button hidden class="show">Show Content</button>
    </main>
    <script src="js/javascript.js"></script>
</body>

</html>
