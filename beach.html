<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Document</title>
</head>

<body id="beach_page">
    <main>
        <section class="content">
            <section class="main">
                <h1>Ocean Waves Lapping on Beach</h1>
                <button><a href="index.html">Storm</a></button>
                <button>Beach</button>
                <button>Forest</button>
            </section>
            <section class="settings">
                <button class="play">Play</button>
                <label for="volume">Volume: </label>
                <input type="range" class="volume" name="volume" min="0" max="100" value="100"><span class="level"> </span>
                <button class="mute ">Mute</button>
                <audio loop class="sound">
                    <source src="sounds/sea.wav" type="audio/wav">
                </audio>
                <button>Hide Content</button>
            </section>
            <section class="credits">
                <button>View Credits</button>
            </section>
        </section>
    </main>
    <script src="js/javascript.js"></script>
</body>

</html>
