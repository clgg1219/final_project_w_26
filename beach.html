<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>
    <title>Document</title>
</head>

<body id="beach_page">
    <main>
        <section class="content">
            <h1>waves lapping on beach</h1>
            <section class="main">
                <a href="index.html">storm</a>
                <a href="beach.html">beach</a>
                <a href="rain.html">rain</a>
            </section>
            <section class="settings">
                <button class="play">play</button>
                <label for="volume">volume: </label>
                <input type="range" class="volume" name="volume" id="volume" min="0" max="100" value="100"><span class="level"> </span>
                <button class="mute ">mute</button>
                <audio loop class="sound">
                    <source src="sounds/sea.mp3" type="audio/mp3">
                </audio>
                <button class="hide">hide content</button>
                <button class="stop" id="stop_beach">stop animation</button>
            </section>
            <section class="credits">
                <a href="credits.html">view credits</a>
            </section>
        </section>
        <button hidden class="show">show content</button>
    </main>
    <script src="js/javascript.js"></script>
</body>

</html>
